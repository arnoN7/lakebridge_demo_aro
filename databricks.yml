bundle:
  name: lakebridge_demo

# ── Deployment variables ──────────────────────────────────────────────────────
# Override on the CLI:  --var catalog=my_catalog  --var schema=my_schema
variables:
  catalog:
    description: "Unity Catalog catalog for assessment tables."
    default: classic_stable_pr2ip7
  schema:
    description: "Schema for assessment tables."
    default: lakebridge_assessment

# ── Targets ───────────────────────────────────────────────────────────────────
targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    # Example:
    #   databricks bundle deploy -t prod \
    #     --var catalog=my_prod_catalog   \
    #     --var schema=lakebridge_assessment

# ── Resources ─────────────────────────────────────────────────────────────────
resources:

  jobs:
    lakebridge_setup:
      name: "[lakebridge_demo] Full Assessment & Table Seeding"
      description: >-
        End-to-end pipeline: bladespector assessment (Phase 0), T-SQL conversion
        via SqlglotEngine (Phase 2a), full SSIS package conversion via BladeBridge
        (Phase 2b), effort-hypothesis seeding, and UC metric-view creation (Phase 3).
        Runs entirely in-cluster — Lakebridge + BladeBridge are pip-installed by the
        notebook, nothing is installed locally. Uses a classic cluster because the
        BladeBridge transpiler is a native Linux binary.
      tasks:
        - task_key: run_demo_notebook
          notebook_task:
            notebook_path: ./Lakebridge SSIS and TSQL Migration Demo
            base_parameters:
              catalog: ${var.catalog}
              schema:  ${var.schema}
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            # ── Cloud-specific node type ─────────────────────────────────────
            # Azure: Standard_DS3_v2   (change for AWS: m5.xlarge / GCP: n1-standard-4)
            node_type_id: Standard_DS3_v2
            num_workers: 1

  dashboards:
    lakebridge_assessment:
      display_name: "Lakebridge Migration Assessment"
      # Generated by scripts/build_dashboard.py — run deploy.sh to create it.
      file_path: ./dist/Lakebridge Migration Assessment.lvdash.json
      embed_credentials: false
