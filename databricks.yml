bundle:
  name: lakebridge_demo

# ── Deployment variables ──────────────────────────────────────────────────────
# Edit the defaults below (or override on the CLI: --var catalog=… --var schema=…).
variables:
  catalog:
    description: "Unity Catalog catalog for assessment tables and metric views."
    default: classic_stable_pr2ip7
  schema:
    description: "Schema for assessment tables and metric views."
    default: lakebridge_assessment
  input_path:
    description: >-
      Folder holding the source files to analyse (.sql, .dtsx) — e.g. a UC Volume the
      you drop code into: /Volumes/<catalog>/<schema>/landing. Leave blank to use
      the version-controlled sample_assets/ shipped with this repo.
    default: ""
  warehouse_id:
    description: >-
      SQL warehouse that runs the dashboard's queries. Change this to a warehouse in
      YOUR workspace (Databricks SQL → Warehouses → copy the ID from the URL/details).
    default: 263392e91167d7f6
  node_type_id:
    description: >-
      Worker/driver VM SKU for the assessment job cluster. Override if the default is
      unavailable in your region (Azure capacity stockout). Azure e.g. Standard_D4ds_v5;
      AWS e.g. m5d.xlarge; GCP e.g. n2-standard-4.
    default: Standard_D4ds_v5
  use_switch:
    description: >-
      "true" = after the deterministic pass, trigger Lakebridge Switch (LLM) on ONLY the
      procedures sqlglot could not transpile; "false" (default) = skip Switch entirely.
    default: "false"
  switch_model:
    description: "Foundation Model serving endpoint Switch uses for LLM conversion."
    default: databricks-claude-sonnet-5

# ── Targets ───────────────────────────────────────────────────────────────────
targets:
  dev:
    mode: development
    default: true

  prod:
    mode: production
    # Example:
    #   databricks bundle deploy -t prod \
    #     --var catalog=my_prod_catalog   \
    #     --var schema=lakebridge_assessment

# ── Resources ─────────────────────────────────────────────────────────────────
resources:

  jobs:
    lakebridge_setup:
      name: "[lakebridge_demo] Full Assessment & Table Seeding"
      description: >-
        End-to-end pipeline: bladespector assessment (Phase 0), T-SQL conversion
        via SqlglotEngine (Phase 2a), full SSIS package conversion via BladeBridge
        (Phase 2b), effort-hypothesis seeding, and UC metric-view creation (Phase 3).
        Runs entirely in-cluster — Lakebridge + BladeBridge are pip-installed by the
        notebook, nothing is installed locally. Uses a classic cluster because the
        BladeBridge transpiler is a native Linux binary.
      tasks:
        - task_key: run_demo_notebook
          notebook_task:
            notebook_path: ./Lakebridge SSIS and TSQL Migration Demo.py
            base_parameters:
              catalog:      ${var.catalog}
              schema:       ${var.schema}
              input_path:   ${var.input_path}
              use_switch:   ${var.use_switch}
              switch_model: ${var.switch_model}
          new_cluster:
            spark_version: "15.4.x-scala2.12"
            # ── Cloud-specific node type (override via --var node_type_id=…) ──
            node_type_id: ${var.node_type_id}
            num_workers: 1

  dashboards:
    lakebridge_assessment:
      display_name: "Lakebridge Migration Assessment"
      # Generated by scripts/build_dashboard.py — run deploy.sh to create it.
      file_path: ./dist/Lakebridge Migration Assessment.lvdash.json
      warehouse_id: ${var.warehouse_id}
      embed_credentials: false
